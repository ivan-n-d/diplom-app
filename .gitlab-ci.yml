stages:
  - build
  - deploy

variables:
  IMAGE_NAME: "$DOCKER_USERNAME/django-diploma"

# Стадия сборки
build_image:
  stage: build
  tags:
    - docker 
  script:
    - echo "Авторизация в Docker Hub..."
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    
    - export TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    
    - echo "Сборка образа с тегом $TAG..."
    - docker build -t $IMAGE_NAME:$TAG .
    
    - echo "Отправка образа в Registry..."
    - docker push $IMAGE_NAME:$TAG


deploy_to_k8s:
  stage: deploy
  tags:
    - docker
  script:
    - curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    - chmod 700 get_helm.sh
    - ./get_helm.sh
    
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_DATA" > ~/.kube/config
    - export KUBECONFIG=~/.kube/config
    
    - export TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    
    - echo "Деплой приложения версии $TAG в Kubernetes..."
    - helm upgrade --install my-django-app ./helm/django-app --set image.tag=$TAG --set image.repository=$IMAGE_NAME
  
  rules:
    - if: $CI_COMMIT_TAG